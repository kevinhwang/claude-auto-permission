name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - .editorconfig
      - .github/dependabot.yml
      - .gitignore
      - "*.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - .editorconfig
      - .github/dependabot.yml
      - .gitignore
      - "*.md"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
